repos:

  # Black — verify formatting (do not auto-rewrite on commit)
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: ["--check"]

  # Ruff — linter & import sorter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.8
    hooks:
      - id: ruff-check
      - id: ruff-format

  # Bandit — security scan (only HIGH severity blocks commits)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-r", ".", "-x", ".venv,venv,build,dist,docs,migrations", "--severity-level", "high"]
        pass_filenames: false

  - repo: local
    hooks:
    - id: pytest-quick
      name: pytest (quick)
      entry: poetry run python -m pytest -q -m "not slow"
      language: system
      pass_filenames: false
