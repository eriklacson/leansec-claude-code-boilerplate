# ============================================================
# Project Behavior Spec — Baseline Security Assessment
# ============================================================
# Full 25-control CSFLite governance assessment for a
# mid-sized company with no prior security baseline.
# ============================================================

project:
  name: "acme-baseline-assessment"
  domain: "assessment"
  description: "CSFLite baseline security coverage assessment for Acme Corp (85 employees, SaaS product, AWS infrastructure)"

scope:
  controls_in_scope:
    - "all"

acceptance_criteria:
  - "All 25 CSFLite controls scored as Yes, Partial, or No with documented evidence or rationale"
  - "Coverage heatmap generated by CSF Function showing gap distribution"
  - "Top 10 priority gaps identified by gap score with remediation guidance"
  - "Executive summary is under 2 pages and readable by non-technical leadership"
  - "All control IDs validated against csflite/controls.json"
  - "Gap analysis includes estimated effort (days) per remediation item"

constraints:
  - "No maturity scoring — coverage only"
  - "All documents in markdown"
  - "Client data never committed to repo"
  - "Remediation guidance must be actionable within 90 days for a team of 2"
  - "No vendor-specific tool recommendations unless client requests them"

deliverables:
  - type: "doc"
    subtype: "assessment-report"
    description: "Full 25-control coverage assessment with scoring, evidence notes, and per-control findings"
  - type: "doc"
    subtype: "gap-analysis"
    description: "Prioritized gap list with remediation guidance and effort estimates"
  - type: "doc"
    subtype: "executive-summary"
    description: "2-page findings summary for CEO and CTO — coverage score, top risks, recommended next steps"
  - type: "app"
    subtype: "web"
    description: "Interactive coverage dashboard with heatmap by Function and drill-down to control-level findings"

stack:
  cli: false
  api: true
  frontend: true
