name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Python
        id: py
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'poetry'
          cache-dependency-path: |
            **/poetry.lock
            **/pyproject.toml

      - name: Ensure Poetry uses this Python
        run: poetry env use "${{ steps.py.outputs.python-path }}"

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --with dev --no-interaction --no-ansi

      - name: Black — code format check
        run: poetry run black --check .

      - name: Ruff — lint
        run: poetry run ruff check .

      - name: Bandit — security scan (HIGH only)
        run: poetry run bandit -r . -x ".venv,venv,build,dist,docs,migrations,tests" --severity-level high

      - name: Run tests
        run: poetry run python -m pytest -q --maxfail=1 --disable-warnings
